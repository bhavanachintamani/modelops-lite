name: CI/CD - ModelOps-Lite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model (so tests have an artifact to hit)
        run: python train_model.py

      - name: Run tests
        run: pytest tests/ -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t modelops-lite:${{ github.sha }} .

      # To actually push to a registry, add a login step + docker/build-push-action
      # with secrets for DOCKERHUB_USERNAME / DOCKERHUB_TOKEN (or GHCR token).
      - name: Confirm image built
        run: docker images | grep modelops-lite
